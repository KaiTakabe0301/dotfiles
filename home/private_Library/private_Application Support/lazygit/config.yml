os:
  editPreset: "nvim-remote"
customCommands:
  - key: "o"
    context: "files"
    description: "Open file in nvim"
    command: 'nvim -- "{{.SelectedFile.Name}}"'
    output: terminal
  - key: "o"
    context: "commitFiles"
    description: "Open file in nvim"
    command: 'nvim -- "{{.SelectedCommitFile.Name}}"'
    output: terminal
gui:
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#88C0D0"
      - bold
    inactiveBorderColor:
      - "#4C566A"
    optionsTextColor:
      - "#81A1C1"
    selectedLineBgColor:
      - "#3B4252"
    selectedRangeBgColor:
      - "#434C5E"
    cherryPickedCommitBgColor:
      - "#EBCB8B"
    cherryPickedCommitFgColor:
      - "#2E3440"
    unstagedChangesColor:
      - "#BF616A"
    defaultFgColor:
      - "#D8DEE9"
    searchingActiveBorderColor:
      - "#A3BE8C"
git:
  branchLogCmd: git log --graph --color=always --date=format:'%Y-%m-%d %H:%M' --pretty=format:'%C(#a0a0a0 reverse)%h%Creset %C(cyan)%ad%Creset %C(#dd4814)%ae%Creset %C(yellow reverse)%d%Creset %n%C(white bold)%s%Creset%n' {{branchName}} --
  pagers:
    - pager: delta --dark --paging=never --syntax-theme="Nord" --side-by-side --line-numbers --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
      colorArg: always
  log:
    showWholeGraph: false
  allBranchesLogCmds:
    - git log --graph --color=always --date=format:'%Y-%m-%d %H:%M' --pretty=format:'%C(#a0a0a0 reverse)%h%Creset %C(cyan)%ad%Creset %C(#dd4814)%ae%Creset %C(yellow reverse)%d%Creset %n%C(white bold)%s%Creset%n' --
  autoFetch: false
