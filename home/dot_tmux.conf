# tmux起動時のシェルをzshにする
set-option -g default-shell /bin/zsh

set -s set-clipboard external

# 24-bit True Color を有効にする
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

# prefixキーをC-qに変更
set -g prefix C-a

# C-bのキーバインドを解除
unbind C-b

# ステータスバーをトップに配置する
set-option -g status-position top

# 左右のステータスバーの長さを決定する
set-option -g status-left-length 90
set-option -g status-right-length 90

# ステータスバーを1秒毎に描画し直す
set-option -g status-interval 3

# smart-splits.nvim との統合
# 現在のペインで vim が起動中か判定
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\.?(view|n?vim?x?|fzf)(diff)?$'"

# C-a + h/j/k/l でペイン移動（vim 連携）
bind h if-shell "$is_vim" 'send-keys C-a h' 'select-pane -L'
bind j if-shell "$is_vim" 'send-keys C-a j' 'select-pane -D'
bind k if-shell "$is_vim" 'send-keys C-a k' 'select-pane -U'
bind l if-shell "$is_vim" 'send-keys C-a l' 'select-pane -R'

# C-a + H/J/K/L でペインリサイズ（vim 連携）
bind -r H if-shell "$is_vim" 'send-keys C-a H' 'resize-pane -L 5'
bind -r J if-shell "$is_vim" 'send-keys C-a J' 'resize-pane -D 5'
bind -r K if-shell "$is_vim" 'send-keys C-a K' 'resize-pane -U 5'
bind -r L if-shell "$is_vim" 'send-keys C-a L' 'resize-pane -R 5'

# | でペインを縦分割する
bind | split-window -h

# - でペインを縦分割する
bind - split-window -v

# 番号基準値を変更
set-option -g base-index 1

# マウス操作を有効にする
set-option -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e'"

# コピーモードを設定する
# コピーモードでvimキーバインドを使う
setw -g mode-keys vi

# 'v' で選択を始める
bind -T copy-mode-vi v send -X begin-selection

# 'V' で行選択
bind -T copy-mode-vi V send -X select-line

# 'C-v' で矩形選択
bind -T copy-mode-vi C-v send -X rectangle-toggle

# 'y' でヤンク
bind -T copy-mode-vi y send -X copy-selection

# 'Y' で行ヤンク
bind -T copy-mode-vi Y send -X copy-line

# 'C-p'でペースト
bind-key C-p paste-buffer

# lazygitをfloating windowで開く
bind g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"

# Claude Codeをpopup windowで開く（永続セッション）
bind -r y run-shell '\
  SESSION="claude-$(echo "#{pane_current_path}" | shasum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claude"; \
  tmux display-popup -w 90% -h 90% -E "tmux attach-session -t $SESSION"'

#===================================
# tpm - Tmux Plugin Manager
#===================================

# List of plugins

# https://github.com/tmux-plugins/tpm
set -g @plugin 'tmux-plugins/tpm'

# https://github.com/tmux-plugins/tmux-sensible
set -g @plugin 'tmux-plugins/tmux-sensible'

# https://github.com/tmux-plugins/tmux-resurrect
set -g @plugin 'tmux-plugins/tmux-resurrect'

# https://github.com/tmux-plugins/tmux-continuum/tree/master
set -g @plugin 'tmux-plugins/tmux-continuum'

# https://github.com/fcsonline/tmux-thumbs?tab=readme-ov-file#thumbs-osc52
set -g @plugin 'fcsonline/tmux-thumbs'

# https://github.com/nordtheme/tmux
set -g @plugin "arcticicestudio/nord-tmux"

# https://github.com/sainnhe/tmux-fzf
set -g @plugin 'sainnhe/tmux-fzf'

#===================================
# tmux-thumbs settings
#===================================

# load tmux-thumbs
run-shell ~/.tmux/plugins/tmux-thumbs/tmux-thumbs.tmux

# allow the content to be copied into system clipboard on OS X
set -g @thumbs-command 'echo -n {} | pbcopy'

# when you are on linux, comment out below to allow the content to be copied into system clipboard
set -g @thumbs-osc52 1

#===================================
# Auto start tmux and restore
#===================================

# auto start terminal
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'iterm'

# auto restore tmux
set -g @continuum-restore 'on'
# auto save interva 1min
set -g @continuum-save-interval '1'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
