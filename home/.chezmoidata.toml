# chezmoi はソースディレクトリ直下の .chezmoidata.{toml,yaml,json} を
# テンプレートデータとして自動マージする。ホスト依存の差分はここに集約し、
# .tmpl 側からは index .hosts .chezmoi.hostname で引く。
# 未登録ホストは _default にフォールバック。

# ───── _default（context-mode 有効ホスト） ─────
[hosts._default]
opus_model = "claude-opus-4-8[1m]"
use_vertex = false
enable_ccgate = true
enable_skills_auto_allow = false
enable_mkdir_cp_auto_allow = false
enable_check_useeffect = false
enable_retry_agent_timeout = false
enable_context_mode = true
enable_claude_usage = true
# 私用機は起動時から ultracode（xhigh + dynamic workflow orchestration）を既定にする
default_ultracode = true
api_timeout_ms = "180000"
stream_idle_timeout_ms = "120000"
max_retries = "5"

[hosts._default.plugins]
"example-skills@anthropic-agent-skills" = true
"context-mode@context-mode" = true

[hosts._default.marketplaces.anthropic-agent-skills.source]
source = "github"
repo = "anthropics/skills"

[hosts._default.marketplaces.context-mode.source]
source = "github"
repo = "mksglu/context-mode"

# ───── kai-caddi（Vertex / pretool・posttool フック有効、context-mode 無効） ─────
[hosts.kai-caddi]
opus_model = "claude-opus-4-8[1m]"
use_vertex = true
enable_ccgate = false
enable_skills_auto_allow = true
enable_mkdir_cp_auto_allow = true
enable_check_useeffect = true
enable_retry_agent_timeout = true
enable_context_mode = false
# Vertex AI 利用ホストは Claude Max の rate_limits が無いため usage widget を無効化
enable_claude_usage = false
# 業務機は通常 effort（ultracode はプロンプトでの明示トリガー時のみ）
default_ultracode = false
api_timeout_ms = "60000"
stream_idle_timeout_ms = "90000"
max_retries = "1"

[hosts.kai-caddi.vertex_env]
CLAUDE_CODE_USE_VERTEX = "true"
CLOUD_ML_REGION = "us-east5"
ANTHROPIC_VERTEX_PROJECT_ID = "caddi-ai-tools-dev"

[hosts.kai-caddi.plugins]
"example-skills@anthropic-agent-skills" = true
"slack@claude-plugins-official" = true

[hosts.kai-caddi.marketplaces.anthropic-agent-skills.source]
source = "github"
repo = "anthropics/skills"
